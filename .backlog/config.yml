project_name: "VulnFeed"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["All acceptance criteria verified and marked as done", "All tests pass", "All linting checks pass", "Any manual tests pass"]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "nano"
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
zero_padded_ids: 2
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
